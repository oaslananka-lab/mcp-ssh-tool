name: 'GitHub Mirror - $(Date:yyyyMMdd).$(Rev:r)'

trigger: none

pr: none

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: MirrorInfo
    displayName: 'Mirror and GitHub Release'
    steps:
      - checkout: self
        fetchDepth: 0
        persistCredentials: true

      - script: |
          echo "This pipeline is manual-only."
          echo "Branch mirroring is handled outside Azure Pipelines."
          echo "Use local git remotes or a git alias such as:"
          echo "git push origin main && git push github main"
        displayName: 'Show branch mirror guidance'

      - script: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [ -z "$TAG" ]; then
            echo "No version tag on this commit. Skipping GitHub Release."
            exit 0
          fi

          PKG_VER=${TAG#v}
          awk "/## \[$PKG_VER\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md | head -50 > github-release-notes.md
        displayName: 'Prepare GitHub release notes'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))

      - task: GitHubRelease@1
        displayName: 'Create GitHub Release'
        condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
        inputs:
          gitHubConnection: 'GitHub'
          repositoryName: 'oaslananka/mcp-ssh-tool'
          action: 'create'
          target: '$(Build.SourceVersion)'
          tagSource: 'gitTag'
          title: 'mcp-ssh-tool $(Build.SourceBranchName)'
          releaseNotesSource: 'filePath'
          releaseNotesFilePath: 'github-release-notes.md'
          isDraft: false
          isPreRelease: false
